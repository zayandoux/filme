<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Pipoca</title>

<!-- FONTE PARECIDA COM A ARTE -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffd6e7, #ffc0cb);
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

/* LOGO */
.topo {
    text-align: center;
}

.logo {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
}

/* CARD */
.card {
    background: #f3eeee;
    border-radius: 30px;
    padding: 25px;
    position: relative;
    border: 8px solid #b85c6b;
}

/* LINHAS */
.linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

/* TEXTO */
.texto {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    color: #5a2e1b;
    line-height: 1.2;
}

.sub {
    font-size: 18px;
}

/* PREÇO */
.preco-area {
    text-align: right;
}

.preco {
    font-family: 'Playfair Display', serif;
    font-size: 50px;
    color: #5a2e1b;
}

/* CONTROLE */
.controle {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 8px;
}

.controle button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: #ff4d88;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 16px;
    padding: 0;
}

.controle span {
    font-size: 16px;
    min-width: 18px;
    text-align: center;
}

/* NUTELLA */
.nutella {
    width: 120px;
    margin-top: 5px;
}

/* SELO P */
.selo {
    position: absolute;
    right: -20px;
    top: 20px;
    width: 95px;
}

/* TOTAL */
.total {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
    color: #b03060;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin-top: 10px;
}

.enviar {
    background: #ff4d88;
    color: white;
}

.limpar {
    background: #ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <img src="logo.png" class="logo">
</div>

<h2 style="text-align:center;">🍿 Monte seu pedido</h2>

<div class="card">

    <!-- PRODUTO 1 -->
    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div class="preco-area">
            <div class="preco">24,90</div>

            <div class="controle">
                <button onclick="alterar('p1', -1)">-</button>
                <span id="p1">0</span>
                <button onclick="alterar('p1', 1)">+</button>
            </div>
        </div>
    </div>

    <!-- PRODUTO 2 -->
    <div class="linha">
        <div class="texto">
            Pipoca <span class="sub">+ creme de Ninho</span><br>
            <img src="nutella.png" class="nutella">
        </div>

        <div class="preco-area">
            <div class="preco">29,90</div>

            <div class="controle">
                <button onclick="alterar('p2', -1)">-</button>
                <span id="p2">0</span>
                <button onclick="alterar('p2', 1)">+</button>
            </div>
        </div>
    </div>

    <!-- SELO -->
    <img src="p.png" class="selo">

</div>

<div class="total" id="total">Total: R$ 0,00</div>

<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Seu nome *">
<input type="text" id="rua" placeholder="Rua *">
<input type="number" id="numero" placeholder="Número *">

<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>

</div>

<script>
const precos = {
    p1: 24.9,
    p2: 29.9
};

function alterar(id, valor){
    let el = document.getElementById(id);
    let atual = parseInt(el.innerText);
    atual += valor;
    if(atual < 0) atual = 0;
    el.innerText = atual;
    atualizarTotal();
}

function atualizarTotal(){
    let total = 0;
    for(let id in precos){
        let qtd = parseInt(document.getElementById(id).innerText);
        total += qtd * precos[id];
    }

    document.getElementById("total").innerText =
        "Total: R$ " + total.toFixed(2).replace(".", ",");
}

function enviarPedido(){
    alert("Pedido enviado (WhatsApp abre aqui)");
}
</script>

</body>
</html>
