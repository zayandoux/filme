<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Pipoca</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffd6e7, #ffc0cb);
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

/* TOPO */
.topo {
    text-align: center;
}

.logo {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
}

/* TITULO */
h2 {
    text-align: center;
}

/* IMAGEM DO PRODUTO */
.produto-imagem {
    position: relative;
    width: 100%;
}

.img-card {
    width: 100%;
    border-radius: 20px;
}

/* CONTROLES */
.controle {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 8px;
}

.controle button {
    background: #ff4d88;
    border: none;
    color: white;

    width: 26px;
    height: 26px;
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 16px;
    line-height: 1;
    padding: 0;

    cursor: pointer;
}

.controle span {
    font-size: 16px;
    font-weight: bold;
}

/* POSIÇÕES (AJUSTÁVEL) */
.controle1 {
    top: 8%;
    right: 10px;
}

.controle2 {
    top: 37%;
    right: 10px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* TOTAL */
.total {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
    color: #b03060;
}

/* TROCO */
.linha-troco {
    display: flex;
    gap: 10px;
    align-items: center;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin-top: 10px;
}

.enviar {
    background: #ff4d88;
    color: white;
}

.limpar {
    background: #ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <img src="logo.png" class="logo">
</div>

<h2>🍿 Monte seu pedido</h2>

<!-- IMAGEM COM PRODUTOS -->
<div class="produto-imagem">

    <img src="tp.png" class="img-card">

    <!-- PRODUTO 1 -->
    <div class="controle controle1">
        <button onclick="alterar('p1', -1)">-</button>
        <span id="p1">0</span>
        <button onclick="alterar('p1', 1)">+</button>
    </div>

    <!-- PRODUTO 2 -->
    <div class="controle controle2">
        <button onclick="alterar('p2', -1)">-</button>
        <span id="p2">0</span>
        <button onclick="alterar('p2', 1)">+</button>
    </div>

</div>

<div class="total" id="total">Total: R$ 0,00</div>

<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Seu nome *">
<input type="text" id="rua" placeholder="Rua *">
<input type="number" id="numero" placeholder="Número *">
<input type="text" id="complemento" placeholder="Complemento">
<input type="text" id="referencia" placeholder="Referência">

<h3>Pagamento</h3>

<select id="pagamento" onchange="verificarPagamento()">
<option value="">Selecione</option>
<option>Débito</option>
<option>Crédito</option>
<option>Vale alimentação</option>
<option>Dinheiro</option>
</select>

<div id="trocoDiv" style="display:none;">
<div class="linha-troco">
<input type="number" id="troco" placeholder="Troco para">
<label><input type="checkbox" id="semTroco" onclick="toggleTroco()"> Sem troco</label>
</div>
</div>

<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>
<button class="limpar" onclick="limparPedido()">Limpar Pedido</button>

</div>

<script>
const precos = {
    p1: 24.9,
    p2: 26.9
};

function alterar(id, valor){
    let el = document.getElementById(id);
    let atual = parseInt(el.innerText);
    atual += valor;
    if(atual < 0) atual = 0;
    el.innerText = atual;
    atualizarTotal();
}

function atualizarTotal(){
    let total = 0;
    for(let id in precos){
        let qtd = parseInt(document.getElementById(id).innerText);
        total += qtd * precos[id];
    }

    document.getElementById("total").innerText =
        "Total: R$ " + total.toFixed(2).replace(".", ",");
}

function verificarPagamento(){
    let pag = document.getElementById("pagamento").value;
    document.getElementById("trocoDiv").style.display =
        pag === "Dinheiro" ? "block" : "none";
}

function toggleTroco(){
    document.getElementById("troco").disabled =
        document.getElementById("semTroco").checked;
}

function limparPedido(){
    if(confirm("Limpar pedido?")){
        for(let id in precos){
            document.getElementById(id).innerText = 0;
        }
        document.querySelectorAll("input").forEach(i => i.value = "");
        document.getElementById("pagamento").value = "";
        atualizarTotal();
    }
}

function enviarPedido(){
    alert("Pedido enviado (WhatsApp abre aqui)");
}
</script>

</body>
</html>
