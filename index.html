<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Pipoca</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffd6e7, #ffc0cb);
}

/* FONTE */
@font-face {
    font-family: 'AZ Cupcakes';
    src: url('AZCupcakesBold.ttf');
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

/* TOPO */
.topo {
    text-align: center;
}

.logo {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
}

/* TITULO */
h2 {
    text-align: center;
    font-size: 26px;
}

/* PRODUTOS */
.produto {
    background: white;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'AZ Cupcakes', Arial, sans-serif;
    color: #5a2e1b;
    font-size: 18px;
}

/* CONTROLES */
.controls {
    display: flex;
    align-items: center;
    gap: 10px;
}

.controls button {
    background: #ff4d88;
    border: none;
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    font-size: 22px;
}

.controls span {
    font-size: 18px;
    min-width: 20px;
    text-align: center;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* TOTAL */
.total {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
    color: #b03060;
}

/* TROCO */
.linha-troco {
    display: flex;
    gap: 10px;
    align-items: center;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin-top: 10px;
}

.enviar {
    background: #ff4d88;
    color: white;
}

.limpar {
    background: #ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <img src="logo.png" class="logo">
</div>

<h2>🍿 Monte seu pedido</h2>

<div class="produto">
Pipoca Ninho + Nutella (MINI) - 16,90
<div class="controls">
<button onclick="alterar('p0', -1)">-</button>
<span id="p0">0</span>
<button onclick="alterar('p0', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho (P) - 24,90
<div class="controls">
<button onclick="alterar('p1', -1)">-</button>
<span id="p1">0</span>
<button onclick="alterar('p1', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho + Nutella (P) - 26,90
<div class="controls">
<button onclick="alterar('p2', -1)">-</button>
<span id="p2">0</span>
<button onclick="alterar('p2', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho (M) - 29,90
<div class="controls">
<button onclick="alterar('p3', -1)">-</button>
<span id="p3">0</span>
<button onclick="alterar('p3', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho + Nutella (M) - 34,90
<div class="controls">
<button onclick="alterar('p4', -1)">-</button>
<span id="p4">0</span>
<button onclick="alterar('p4', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho (G) - 47,90
<div class="controls">
<button onclick="alterar('p5', -1)">-</button>
<span id="p5">0</span>
<button onclick="alterar('p5', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho + Nutella (G) - 52,90
<div class="controls">
<button onclick="alterar('p6', -1)">-</button>
<span id="p6">0</span>
<button onclick="alterar('p6', 1)">+</button>
</div>
</div>

<div class="total" id="total">Total: R$ 0,00</div>

<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Seu nome *">
<input type="text" id="rua" placeholder="Rua *">
<input type="number" id="numero" placeholder="Número *">
<input type="text" id="complemento" placeholder="Complemento">
<input type="text" id="referencia" placeholder="Referência">

<h3>Pagamento</h3>

<select id="pagamento" onchange="verificarPagamento()">
<option value="">Selecione</option>
<option>Débito</option>
<option>Crédito</option>
<option>Vale alimentação</option>
<option>Dinheiro</option>
</select>

<div id="trocoDiv" style="display:none;">
<div class="linha-troco">
<input type="number" id="troco" placeholder="Troco para">
<label><input type="checkbox" id="semTroco" onclick="toggleTroco()"> Sem troco</label>
</div>
</div>

<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>
<button class="limpar" onclick="limparPedido()">Limpar Pedido</button>

</div>

<script>
const precos = {
p0: 16.9,
p1: 24.9,
p2: 26.9,
p3: 29.9,
p4: 34.9,
p5: 47.9,
p6: 52.9
};

function alterar(id, valor){
    let el = document.getElementById(id);
    let atual = parseInt(el.innerText);
    atual += valor;
    if(atual < 0) atual = 0;
    el.innerText = atual;
    atualizarTotal();
}

function atualizarTotal(){
    let total = 0;
    for(let id in precos){
        let qtd = parseInt(document.getElementById(id).innerText);
        total += qtd * precos[id];
    }

    document.getElementById("total").innerText =
        "Total: R$ " + total.toFixed(2).replace(".", ",");
}

function verificarPagamento(){
    let pag = document.getElementById("pagamento").value;
    document.getElementById("trocoDiv").style.display =
        pag === "Dinheiro" ? "block" : "none";
}

function toggleTroco(){
    document.getElementById("troco").disabled =
        document.getElementById("semTroco").checked;
}

function limparPedido(){
    if(confirm("Limpar pedido?")){
        for(let id in precos){
            document.getElementById(id).innerText = 0;
        }
        document.querySelectorAll("input").forEach(i => i.value = "");
        document.getElementById("pagamento").value = "";
        atualizarTotal();
    }
}

function enviarPedido(){
    alert("Pedido enviado (WhatsApp abre aqui)");
}
</script>

</body>
</html>
