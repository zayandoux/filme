<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Premium</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#000;
color:#fff;
}

/* NAVBAR */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
position:fixed;
width:100%;
top:0;
z-index:10;
}

.logo{
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

.btn-login{
border:1px solid #fff;
padding:8px 16px;
cursor:pointer;
transition:0.3s;
}

.btn-login:hover{
background:#fff;
color:#000;
}

/* HERO */
.hero{
height:100vh;
background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
max-width:500px;
}

.btn-main{
background:#fff;
color:#000;
padding:12px 24px;
font-weight:bold;
cursor:pointer;
border:none;
transition:0.3s;
}

.btn-main:hover{
background:#ccc;
}

/* PLANOS */
.planos{
padding:80px 20px;
text-align:center;
}

.planos h2{
margin-bottom:40px;
font-size:28px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
border:1px solid #fff;
padding:30px;
width:250px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#111;
}

.card h3{
margin-bottom:10px;
}

.preco{
font-size:22px;
margin:15px 0;
}

.btn-plano{
border:1px solid #fff;
padding:10px;
cursor:pointer;
transition:0.3s;
}

.btn-plano:hover{
background:#fff;
color:#000;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
border-top:1px solid #333;
margin-top:40px;
font-size:14px;
}
</style>

</head>

<body>

<header>
<div class="logo">SEU LOGO</div>
<div class="btn-login">Entrar</div>
</header>

<section class="hero">
<h1>Filmes, séries e muito mais</h1>
<p>Assista onde quiser. Cancele quando quiser.</p>
<button class="btn-main" onclick="scrollToPlanos()">Ver Planos</button>
</section>

<section class="planos" id="planos">
<h2>Escolha seu plano</h2>

<div class="cards">

<div class="card">
<h3>1 Mês</h3>
<div class="preco">R$ 30,00</div>
<div class="btn-plano" onclick="comprar('1 mês')">Assinar</div>
</div>

<div class="card">
<h3>3 Meses</h3>
<div class="preco">R$ 75,00</div>
<div class="btn-plano" onclick="comprar('3 meses')">Assinar</div>
</div>

<div class="card">
<h3>6 Meses</h3>
<div class="preco">R$ 139,90</div>
<div class="btn-plano" onclick="comprar('6 meses')">Assinar</div>
</div>

<div class="card">
<h3>1 Ano</h3>
<div class="preco">R$ 259,90</div>
<div class="btn-plano" onclick="comprar('1 ano')">Assinar</div>
</div>

</div>
</section>

<footer>
© 2026 Streaming Premium - Todos os direitos reservados
</footer>

<script>
function scrollToPlanos(){
document.getElementById('planos').scrollIntoView({behavior:'smooth'});
}

function comprar(plano){
alert("Você escolheu o plano de " + plano);
}
</script>

</body>
</html>
