<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Pipoca</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffd6e7, #ffc0cb);
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

.topo {
    text-align: center;
}

.logo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(4px);

    border-radius: 25px;
    padding: 30px 15px 15px;
    margin-top: 60px;

    border: 6px solid #b85c6b;
    position: relative;
}

/* SELO */
.selo {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 95px;
    z-index: 10;
}

/* LINHA */
.linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

/* TEXTO */
.texto {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #5a2e1b;
    line-height: 1.2;
}

.sub {
    font-size: 15px;
}

/* PREÇO */
.preco {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    color: #5a2e1b;
    padding: 4px 10px;
    border-radius: 10px;
    display: inline-block;
}

/* CONTROLE */
.controle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    margin-top: 2px;
}

.controle button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: #ff4d88;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 16px;
    padding: 0;
}

.controle span {
    font-size: 16px;
    font-weight: bold;
    line-height: 1;
    margin-bottom: -2px;
}

/* linha dos botões */
.controle div {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    margin-top: -30px;
}

/* botões */
.controle button {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #ff4d88;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 16px;
    padding: 0;
}

/* NUTELLA */
.nutella {
    width: 110px;
    margin-top: 5px;
}

/* TOTAL */
.total {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
    color: #b03060;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin-top: 10px;
}

.enviar {
    background: #ff4d88;
    color: white;
}

.limpar {
    background: #ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <img src="logo.png" class="logo">
</div>

<h2 style="text-align:center;">🍿 Monte seu pedido</h2>

<!-- ================= P ================= -->
<div class="card">
    <img src="P.png" class="selo">

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div>
            <div class="preco">24,90</div>

            <div class="controle">
                <span id="p1">0</span>
                <div>
                    <button onclick="alterar('p1', -1)">-</button>
                    <button onclick="alterar('p1', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="linha">
        <div class="texto">
            Pipoca <span class="sub">+ creme de Ninho</span><br>
            <img src="nutella.png" class="nutella">
        </div>

        <div>
            <div class="preco">29,90</div>

            <div class="controle">
                <span id="p2">0</span>
                <div>
                    <button onclick="alterar('p2', -1)">-</button>
                    <button onclick="alterar('p2', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================= M ================= -->
<div class="card">
    <img src="M.png" class="selo">

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div>
            <div class="preco">29,90</div>

            <div class="controle">
                <span id="m1">0</span>
                <div>
                    <button onclick="alterar('m1', -1)">-</button>
                    <button onclick="alterar('m1', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="linha">
        <div class="texto">
            Pipoca <span class="sub">+ creme de Ninho</span><br>
            <img src="nutella.png" class="nutella">
        </div>

        <div>
            <div class="preco">34,90</div>

            <div class="controle">
                <span id="m2">0</span>
                <div>
                    <button onclick="alterar('m2', -1)">-</button>
                    <button onclick="alterar('m2', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================= G ================= -->
<div class="card">
    <img src="G.png" class="selo">

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div>
            <div class="preco">47,90</div>

            <div class="controle">
                <span id="g1">0</span>
                <div>
                    <button onclick="alterar('g1', -1)">-</button>
                    <button onclick="alterar('g1', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="linha">
        <div class="texto">
            Pipoca <span class="sub">+ creme de Ninho</span><br>
            <img src="nutella.png" class="nutella">
        </div>

        <div>
            <div class="preco">52,90</div>

            <div class="controle">
                <span id="g2">0</span>
                <div>
                    <button onclick="alterar('g2', -1)">-</button>
                    <button onclick="alterar('g2', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TOTAL -->
<div class="total" id="total">Total: R$ 0,00</div>

<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Seu nome *">
<input type="text" id="rua" placeholder="Rua *">
<input type="number" id="numero" placeholder="Número *">

<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>
<button class="limpar" onclick="limparPedido()">Limpar Pedido</button>

</div>

<script>
const precos = {
    p1: 24.9, p2: 29.9,
    m1: 29.9, m2: 34.9,
    g1: 47.9, g2: 52.9
};

function alterar(id, valor){
    let el = document.getElementById(id);
    let atual = parseInt(el.innerText);
    atual += valor;
    if(atual < 0) atual = 0;
    el.innerText = atual;
    atualizarTotal();
}

function atualizarTotal(){
    let total = 0;
    for(let id in precos){
        let qtd = parseInt(document.getElementById(id).innerText);
        total += qtd * precos[id];
    }

    document.getElementById("total").innerText =
        "Total: R$ " + total.toFixed(2).replace(".", ",");
}

function limparPedido(){
    if(confirm("Limpar pedido?")){
        for(let id in precos){
            document.getElementById(id).innerText = 0;
        }
        document.querySelectorAll("input").forEach(i => i.value = "");
        atualizarTotal();
    }
}

function enviarPedido(){
    alert("Pedido enviado (WhatsApp abre aqui)");
}
</script>

</body>
</html>
