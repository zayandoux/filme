<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doce Pipoca</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* 🌸 rosa mais claro */
    background: radial-gradient(circle at top,
        #ffe6f2 0%,
        #ffb3d6 45%,
        #ff5c9a 100%
    );

    overflow-x: hidden;
}

/* ✨ brilho principal mais forte */
body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: radial-gradient(circle,
        rgba(255,255,255,0.35) 0%,
        rgba(255,255,255,0.12) 35%,
        transparent 70%
    );

    animation: glowMove 8s ease-in-out infinite;
    pointer-events: none;
}

/* ✨ glitter MAIS visível */
body::after {
    content: "";
    position: fixed;
    inset: 0;

    background-image:
        radial-gradient(rgba(255,255,255,0.9) 1.2px, transparent 1.2px),
        radial-gradient(rgba(255,255,255,0.5) 1px, transparent 1px);

    background-size: 45px 45px, 80px 80px;
    background-position: 0 0, 25px 25px;

    opacity: 0.45;
    animation: glitterMove 18s linear infinite;

    pointer-events: none;
}

/* movimento do brilho */
@keyframes glowMove {
    0% { transform: translate(0,0) scale(1); opacity: 0.6; }
    50% { transform: translate(20px,-15px) scale(1.08); opacity: 1; }
    100% { transform: translate(0,0) scale(1); opacity: 0.6; }
}

/* movimento do glitter */
@keyframes glitterMove {
    from { transform: translateY(0); }
    to { transform: translateY(-250px); }
}

.container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
}

/* garante mesma largura real para inputs e botões */
input, select, button {
    width: 100%;
    box-sizing: border-box;
}

/* deixa tudo com o mesmo “bloco visual” */
input, select {
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* botões alinhados perfeitamente */
button {
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin-top: 10px;
    display: block;
    cursor: pointer;
}

.topo {
    text-align: center;
}

.logo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-radius: 25px;
    padding: 30px 15px 15px;
    margin-top: 60px;

    position: relative;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    border: 2px solid rgba(255, 77, 136, 0.55);
}

/* SELO */
.selo {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 95px;
}

/* LINHA */
.linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

/* TEXTO */
.texto {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #5a2e1b;
    line-height: 1.2;
}

.sub {
    font-size: 15px;
}

/* PREÇO */
.preco {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    color: #5a2e1b;
    padding: 4px 10px;
    border-radius: 10px;
    text-align: center;
}

/* CONTROLE */
.controle {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 2px;
}

.controle span {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: -2px;
}

.controle div {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: -30px;
}

.controle button {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: #ff4d88;
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 18px;
    padding: 0;
    line-height: 1;
}

/* NUTELLA */
.linha-extra {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 5px;
}

.plus {
    font-size: 28px;
    font-weight: bold;
    color: #5a2e1b;
}

.nutella {
    width: 110px;
}

/* TOTAL */
.total {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
    color: #000000;
}

.enviar { background: #ff4d88; color: white; }
.limpar { background: #ddd; }
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <img src="logo.png" class="logo">
</div>

<h2 style="text-align:center;"> Faça seu pedido</h2>

<div class="card">
    <img src="P.png" class="selo">

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div>
            <div class="preco">24,90</div>
            <div class="controle">
                <span id="p1">0</span>
                <div>
                    <button onclick="alterar('p1', -1)">-</button>
                    <button onclick="alterar('p1', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
            <div class="linha-extra">
                <span class="plus">+</span>
                <img src="nutella.png" class="nutella">
            </div>
        </div>

        <div>
            <div class="preco">26,90</div>
            <div class="controle">
                <span id="p2">0</span>
                <div>
                    <button onclick="alterar('p2', -1)">-</button>
                    <button onclick="alterar('p2', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>


<div class="card">
    <img src="M.png" class="selo">

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div>
            <div class="preco">29,90</div>
            <div class="controle">
                <span id="m1">0</span>
                <div>
                    <button onclick="alterar('m1', -1)">-</button>
                    <button onclick="alterar('m1', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
            <div class="linha-extra">
                <span class="plus">+</span>
                <img src="nutella.png" class="nutella">
            </div>
        </div>

        <div>
            <div class="preco">34,90</div>
            <div class="controle">
                <span id="m2">0</span>
                <div>
                    <button onclick="alterar('m2', -1)">-</button>
                    <button onclick="alterar('m2', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <img src="G.png" class="selo">

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
        </div>

        <div>
            <div class="preco">47,90</div>
            <div class="controle">
                <span id="g1">0</span>
                <div>
                    <button onclick="alterar('g1', -1)">-</button>
                    <button onclick="alterar('g1', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="linha">
        <div class="texto">
            Pipoca Ninho <span class="sub">+ creme de Ninho</span>
            <div class="linha-extra">
                <span class="plus">+</span>
                <img src="nutella.png" class="nutella">
            </div>
        </div>

        <div>
            <div class="preco">52,90</div>
            <div class="controle">
                <span id="g2">0</span>
                <div>
                    <button onclick="alterar('g2', -1)">-</button>
                    <button onclick="alterar('g2', 1)">+</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="total" id="total">Total: R$ 0,00</div>

<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Nome *">
<input type="text" id="cep" placeholder="CEP *" onblur="buscarCEP()">
<input type="text" id="cidade" placeholder="Cidade *">
<input type="text" id="rua" placeholder="Rua *">
<input type="number" id="numero" placeholder="Número *">
<input type="text" id="complemento" placeholder="Complemento">
<select id="pagamento" onchange="mostrarTroco()">
<option value="">Forma de pagamento *</option>
<option value="Dinheiro">Dinheiro</option>
<option value="Pix">Pix</option>
<option value="Débito">Débito</option>
<option value="Crédito">Crédito</option>
</select>

<div id="areaTroco" style="display:none;">
<input type="number" id="troco" placeholder="Troco para quanto?">
</div>

<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>
<button class="limpar" onclick="limparPedido()">Limpar Pedido</button>

</div>

<script>
const precos = {
    p1:24.9, p2:26.9,
    m1:29.9, m2:34.9,
    g1:47.9, g2:52.9
};

function alterar(id, v) {
    let el = document.getElementById(id);
    let x = parseInt(el.innerText) + v;
    if (x < 0) x = 0;
    el.innerText = x;
    calc();
}

function calc() {
    let t = 0;
    for (let i in precos) {
        let qtd = parseInt(document.getElementById(i).innerText);
        t += qtd * precos[i];
    }
    document.getElementById("total").innerText = "Total: R$ " + t.toFixed(2).replace(".", ",");
}

function buscarCEP() {
    let cep = document.getElementById("cep").value.replace(/\D/g, '');
    if (cep.length !== 8) return;
    fetch(`https://viacep.com.br/ws/${cep}/json//`)
        .then(r => r.json())
        .then(d => {
            if (d.erro) return alert("CEP inválido");
            document.getElementById("rua").value = d.logradouro || "";
            document.getElementById("cidade").value = d.localidade || "";
        });
}

function mostrarTroco() {
    let p = document.getElementById("pagamento").value;
    document.getElementById("areaTroco").style.display = (p === "Dinheiro") ? "block" : "none";
}

function enviarPedido() {
    let nome = document.getElementById("nome").value;
    let rua = document.getElementById("rua").value;
    let num = document.getElementById("numero").value;
    
    let itens = "";
    const label = {
        p1: "P - Ninho", p2: "P - Ninho+Nutella",
        m1: "M - Ninho", m2: "M - Ninho+Nutella",
        g1: "G - Ninho", g2: "G - Ninho+Nutella"
    };

    for (let i in precos) {
        let q = document.getElementById(i).innerText;
        if (q > 0) itens += `${q}x ${label[i]}\n`;
    }

    if (!itens) return alert("Escolha pelo menos um item!");
    if (!nome || !rua || !num) return alert("Preencha nome e endereço!");

    let msg = `🍿 *NOVO PEDIDO*\n\n${itens}\n💰 *${document.getElementById("total").innerText}*\n\n👤 ${nome}\n📍 ${rua}, ${num}`;
    
    window.open("https://wa.me/5511999999999?text=" + encodeURIComponent(msg));
}

function limparPedido() {
    location.reload();
}
</script>

</body>
</html>
