<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Doce Pipoca - Pedido</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffd6e7, #ffc0cb);
    touch-action: manipulation;
}

.container {
    padding: 15px;
}

h1 {
    text-align: center;
    color: #b03060;
}

.produto {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.controls {
    display: flex;
    align-items: center;
}

.controls button {
    background: #ff4d88;
    border: none;
    color: white;
    font-size: 18px;
    width: 35px;
    height: 35px;
    border-radius: 50%;
}

.controls span {
    margin: 0 10px;
    font-size: 16px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.total {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    margin: 10px 0;
    color: #b03060;
}

.linha-troco {
    display: flex;
    gap: 10px;
    align-items: center;
}

.linha-troco input[type="text"] {
    flex: 1;
}

.linha-troco label {
    font-size: 14px;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin-top: 10px;
}

.enviar {
    background: #ff4d88;
    color: white;
}

.limpar {
    background: #ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>🍿 Doce Pipoca</h1>

<h3>Produtos</h3>

<div class="produto">
Pipoca Ninho (P) - 24,90
<div class="controls">
<button onclick="alterar('p1', -1)">-</button>
<span id="p1">0</span>
<button onclick="alterar('p1', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho + Nutella (P) - 26,90
<div class="controls">
<button onclick="alterar('p2', -1)">-</button>
<span id="p2">0</span>
<button onclick="alterar('p2', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho (M) - 29,90
<div class="controls">
<button onclick="alterar('p3', -1)">-</button>
<span id="p3">0</span>
<button onclick="alterar('p3', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho + Nutella (M) - 34,90
<div class="controls">
<button onclick="alterar('p4', -1)">-</button>
<span id="p4">0</span>
<button onclick="alterar('p4', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho (G) - 47,90
<div class="controls">
<button onclick="alterar('p5', -1)">-</button>
<span id="p5">0</span>
<button onclick="alterar('p5', 1)">+</button>
</div>
</div>

<div class="produto">
Pipoca Ninho + Nutella (G) - 52,90
<div class="controls">
<button onclick="alterar('p6', -1)">-</button>
<span id="p6">0</span>
<button onclick="alterar('p6', 1)">+</button>
</div>
</div>

<div class="total" id="total">Total: R$ 0,00</div>

<h3>Seus dados</h3>

<input type="text" id="nome" placeholder="Seu nome *">

<input type="text" id="rua" placeholder="Rua *">

<input type="number" id="numero" placeholder="Número *">

<input type="text" id="referencia" placeholder="Ponto de referência (opcional)">

<h3>Pagamento</h3>

<select id="pagamento" onchange="verificarPagamento()">
<option value="">Selecione *</option>
<option>Débito</option>
<option>Crédito</option>
<option>Vale alimentação</option>
<option>Dinheiro</option>
</select>

<div id="trocoDiv" style="display:none;">
<div class="linha-troco">
<input type="text" id="troco" placeholder="Troco para">
<label>
<input type="checkbox" id="semTroco" onclick="toggleTroco()"> Sem troco
</label>
</div>
</div>

<button class="enviar" onclick="enviarPedido()">Enviar Pedido</button>
<button class="limpar" onclick="limparPedido()">Limpar Pedido</button>

</div>

<script>

const precos = {
p1: 24.9,
p2: 26.9,
p3: 29.9,
p4: 34.9,
p5: 47.9,
p6: 52.9
};

function alterar(id, valor){
    let el = document.getElementById(id);
    let atual = parseInt(el.innerText);
    atual += valor;
    if(atual < 0) atual = 0;
    el.innerText = atual;
    atualizarTotal();
}

function atualizarTotal(){
    let total = 0;
    for(let id in precos){
        let qtd = parseInt(document.getElementById(id).innerText);
        total += qtd * precos[id];
    }
    document.getElementById("total").innerText =
        "Total: R$ " + total.toFixed(2).replace(".", ",");
}

function verificarPagamento(){
    let pag = document.getElementById("pagamento").value;
    document.getElementById("trocoDiv").style.display =
        pag === "Dinheiro" ? "block" : "none";
}

function toggleTroco(){
    let check = document.getElementById("semTroco").checked;
    document.getElementById("troco").disabled = check;
}

function limparPedido(){
    if(confirm("Deseja realmente limpar o pedido?")){
        for(let id in precos){
            document.getElementById(id).innerText = 0;
        }
        document.getElementById("nome").value = "";
        document.getElementById("rua").value = "";
        document.getElementById("numero").value = "";
        document.getElementById("referencia").value = "";
        document.getElementById("pagamento").value = "";
        document.getElementById("troco").value = "";
        document.getElementById("semTroco").checked = false;
        document.getElementById("troco").disabled = false;
        document.getElementById("trocoDiv").style.display = "none";
        atualizarTotal();
    }
}

function enviarPedido(){

let nome = document.getElementById("nome").value;
let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let referencia = document.getElementById("referencia").value;
let pagamento = document.getElementById("pagamento").value;
let troco = document.getElementById("troco").value;
let semTroco = document.getElementById("semTroco").checked;

if (!nome || !rua || !numero || !pagamento) {
    alert("Preencha os campos obrigatórios!");
    return;
}

let produtos = "";

function add(nome, qtd){
    if(qtd > 0){
        produtos += `- ${nome} x${qtd}%0A`;
    }
}

add("Pipoca Ninho (P)", document.getElementById("p1").innerText);
add("Pipoca Ninho + Nutella (P)", document.getElementById("p2").innerText);
add("Pipoca Ninho (M)", document.getElementById("p3").innerText);
add("Pipoca Ninho + Nutella (M)", document.getElementById("p4").innerText);
add("Pipoca Ninho (G)", document.getElementById("p5").innerText);
add("Pipoca Ninho + Nutella (G)", document.getElementById("p6").innerText);

if(produtos === ""){
    alert("Escolha pelo menos 1 produto!");
    return;
}

let total = document.getElementById("total").innerText;

let msgTroco = "";
if(pagamento === "Dinheiro"){
    if(semTroco){
        msgTroco = "%0A💰 Sem troco";
    } else if(troco){
        msgTroco = `%0A💰 Troco para: R$ ${troco}`;
    }
}

let mensagem = `*NOVO PEDIDO* 🍿%0A%0A` +
`🛒 Pedido:%0A${produtos}%0A` +
`${total}%0A%0A` +
`👤 Nome: ${nome}%0A%0A` +
`📍 Endereço:%0A${rua}, ${numero}%0A${referencia}%0A%0A` +
`💳 Pagamento: ${pagamento}${msgTroco}`;

let url = `https://wa.me/5512981899366?text=${mensagem}`;

window.open(url, "_blank");
}
</script>

</body>
</html>
