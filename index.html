<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Doce Pipoca - Pedido</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f8c8dc, #ffd6e7);
    padding: 20px;
    color: #5a2a3b;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #fff0f5;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #b03060;
}

label {
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.produto {
    background: #ffe4ec;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 15px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #e04379;
}
</style>
</head>

<body>

<div class="container">
<h1>🍿 Doce Pipoca</h1>

<label>Nome *</label>
<input type="text" id="nome" required>

<h3>Escolha seus produtos</h3>

<div class="produto">
<label>Pipoca Ninho (P) - R$24,90</label>
<input type="number" id="p1" min="0" value="0">
</div>

<div class="produto">
<label>Pipoca Ninho + Nutella (P) - R$26,90</label>
<input type="number" id="p2" min="0" value="0">
</div>

<div class="produto">
<label>Pipoca Ninho (M) - R$29,90</label>
<input type="number" id="p3" min="0" value="0">
</div>

<div class="produto">
<label>Pipoca Ninho + Nutella (M) - R$34,90</label>
<input type="number" id="p4" min="0" value="0">
</div>

<div class="produto">
<label>Pipoca Ninho (G) - R$47,90</label>
<input type="number" id="p5" min="0" value="0">
</div>

<div class="produto">
<label>Pipoca Ninho + Nutella (G) - R$52,90</label>
<input type="number" id="p6" min="0" value="0">
</div>

<h3>Endereço</h3>

<label>Rua *</label>
<input type="text" id="rua">

<label>Número *</label>
<input type="text" id="numero">

<label>Complemento</label>
<input type="text" id="complemento">

<label>Ponto de referência (opcional)</label>
<input type="text" id="referencia">

<h3>Pagamento *</h3>

<select id="pagamento">
<option value="">Selecione</option>
<option>Débito</option>
<option>Crédito</option>
<option>Vale alimentação</option>
</select>

<button onclick="enviarPedido()">Enviar Pedido</button>

</div>

<script>
function enviarPedido() {

let nome = document.getElementById("nome").value;
let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let complemento = document.getElementById("complemento").value;
let referencia = document.getElementById("referencia").value;
let pagamento = document.getElementById("pagamento").value;

if (!nome || !rua || !numero || !pagamento) {
    alert("Preencha todos os campos obrigatórios!");
    return;
}

let produtos = "";

function add(nome, qtd){
    if(qtd > 0){
        produtos += `- ${nome} x${qtd}%0A`;
    }
}

add("Pipoca Ninho (P)", document.getElementById("p1").value);
add("Pipoca Ninho + Nutella (P)", document.getElementById("p2").value);
add("Pipoca Ninho (M)", document.getElementById("p3").value);
add("Pipoca Ninho + Nutella (M)", document.getElementById("p4").value);
add("Pipoca Ninho (G)", document.getElementById("p5").value);
add("Pipoca Ninho + Nutella (G)", document.getElementById("p6").value);

if(produtos === ""){
    alert("Selecione pelo menos 1 produto!");
    return;
}

let mensagem = `*NOVO PEDIDO* 🍿%0A%0A` +
`👤 Nome: ${nome}%0A%0A` +
`🛒 Pedido:%0A${produtos}%0A` +
`📍 Endereço:%0A${rua}, ${numero}%0A${complemento}%0A${referencia}%0A%0A` +
`💳 Pagamento: ${pagamento}`;

let telefone = "5512981899366";

let url = `https://wa.me/${telefone}?text=${mensagem}`;

window.open(url, "_blank");

}
</script>

</body>
</html>
