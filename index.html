<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bingo</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

h1{
letter-spacing:10px;
}

.grid{
display:grid;
grid-template-columns: repeat(5,80px);
gap:12px;
justify-content:center;
margin-top:20px;
}

.num{
width:80px;
height:80px;
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
background:white;
transition:0.2s;
}

.num.mark{
border-radius:50%;
background:#4caf50;
color:white;
}

.free{
background:#ddd;
font-size:18px;
}

#msg{
margin-top:25px;
font-size:24px;
font-weight:bold;
color:#2e7d32;
display:none;
}

</style>
</head>

<body>

<h1>BINGO</h1>

<div class="grid" id="bingo">

<div class="num">4</div>
<div class="num">25</div>
<div class="num">42</div>
<div class="num">49</div>
<div class="num">70</div>

<div class="num">5</div>
<div class="num">18</div>
<div class="num">36</div>
<div class="num">55</div>
<div class="num">63</div>

<div class="num">13</div>
<div class="num">24</div>
<div class="num free mark">FREE</div>
<div class="num">54</div>
<div class="num">64</div>

<div class="num">7</div>
<div class="num">30</div>
<div class="num">39</div>
<div class="num">48</div>
<div class="num">65</div>

<div class="num">6</div>
<div class="num">19</div>
<div class="num">32</div>
<div class="num">57</div>
<div class="num">62</div>

</div>

<div id="msg">🎉 BINGO! Cartela completa!</div>

<script>

let nums = document.querySelectorAll(".num");

nums.forEach(n => {
if(!n.classList.contains("free")){
n.onclick = () => {
n.classList.toggle("mark");
checkWin();
}
}
});

function checkWin(){
let total = document.querySelectorAll(".num").length;
let marcados = document.querySelectorAll(".mark").length;

if(marcados === total){
document.getElementById("msg").style.display="block";
}
}

</script>

</body>
</html>
